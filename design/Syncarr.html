<script>
  // Animate the loading bar while Babel compiles
  let w = 0;
  const bar = document.getElementById('splash-bar');
  const iv = setInterval(()=>{ w = Math.min(w + (Math.random()*8), 88); bar.style.width = w+'%'; }, 120);
  window.__splashDone = function() {
    clearInterval(iv);
    bar.style.width = '100%';
    setTimeout(()=>{ const s=document.getElementById('splash'); if(s) s.style.display='none'; }, 300);
  };

function Badge({ label, color='default', dot=false }) {
  const pal = {
    default:     { bg:T.bg4,       text:T.text1,      d:T.text3 },
    green:       { bg:T.accentDim, text:T.accentText, d:T.accent },
    downloading: { bg:T.infoDim,   text:T.info,       d:T.info },
    queued:      { bg:T.bg4,       text:T.text2,      d:T.text3 },
    delivered:   { bg:T.accentDim, text:T.accentText, d:T.accent },
    error:       { bg:T.errorDim,  text:T.error,      d:T.error },
    ready:       { bg:T.accentDim, text:T.accentText, d:T.accent },
    transcoding: { bg:T.infoDim,   text:T.info,       d:T.info },
    failed:      { bg:T.errorDim,  text:T.error,      d:T.error },
    online:      { bg:T.accentDim, text:T.accentText, d:T.accent },
    offline:     { bg:T.bg4,       text:T.text3,      d:T.text3 },
  };
  const p = pal[color] || pal.default;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'2px 8px', borderRadius:4, background:p.bg, color:p.text, fontSize:11, fontFamily:"'DM Mono', monospace", fontWeight:500, whiteSpace:'nowrap' }}>
      {dot && <span style={{ width:5, height:5, borderRadius:'50%', background:p.d, flexShrink:0 }}></span>}
      {label}
    </span>
  );
}

function ProgressBar({ value, color=T.accent, height=4, style={} }) {
  return (
    <div style={{ width:'100%', height, background:T.bg4, borderRadius:height, overflow:'hidden', ...style }}>
      <div style={{ width:`${Math.min(100,value)}%`, height:'100%', background:color, borderRadius:height, transition:'width 0.4s ease' }}></div>
    </div>
  );
}

function StorageBar({ used, budget }) {
  const pct = Math.min(100,(used/budget)*100);
  const color = pct>90 ? T.error : pct>75 ? T.warn : T.accent;
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
      <ProgressBar value={pct} color={color} height={5} />
      <div style={{ display:'flex', justifyContent:'space-between', color:T.text2, fontSize:11, fontFamily:"'DM Mono', monospace" }}>
        <span>{used} GB used</span><span>{budget} GB</span>
      </div>
    </div>
  );
}

function Btn({ children, variant='default', onClick, disabled, style={}, small=false }) {
  const [hov, setHov] = useState(false);
  const bg = variant==='primary' ? (hov?'oklch(72% 0.15 160)':T.accent)
           : variant==='danger'  ? T.errorDim
           : variant==='ghost'   ? (hov?T.bg3:'transparent')
           : (hov?T.bg3:T.bg4);
  const col = variant==='primary' ? '#0a1a0f' : variant==='danger' ? T.error : variant==='ghost' ? T.text2 : T.text1;
  const bdr = variant==='primary' ? T.accent : variant==='danger' ? 'transparent' : variant==='ghost' ? 'transparent' : T.border2;
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ display:'inline-flex', alignItems:'center', gap:6, padding:small?'5px 10px':'7px 14px', background:bg, color:disabled?T.text3:col, border:`1px solid ${bdr}`, borderRadius:5, cursor:disabled?'not-allowed':'pointer', fontSize:small?12:13, fontFamily:"'DM Sans', sans-serif", fontWeight:500, transition:'background 0.1s', opacity:disabled?.5:1, ...style }}>
      {children}
    </button>
  );
}

function IconBtn({ title, onClick, children, style={} }) {
  const [hov, setHov] = useState(false);
  return (
    <button title={title} onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ background:hov?T.bg4:'transparent', border:'none', color:hov?T.text1:T.text2, borderRadius:4, width:28, height:28, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'background 0.1s, color 0.1s', flexShrink:0, ...style }}>
      {children}
    </button>
  );
}

function SynInput({ value, onChange, placeholder, style={}, prefixIcon }) {
  return (
    <div style={{ position:'relative', display:'flex', alignItems:'center' }}>
      {prefixIcon && <span style={{ position:'absolute', left:9, color:T.text3, pointerEvents:'none', display:'flex' }}>{prefixIcon}</span>}
      <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}

function SynSelect({ value, onChange, options, style={} }) {
  return (
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{ background:T.bg2, border:`1px solid ${T.border}`, borderRadius:5, color:T.text0, fontSize:13, fontFamily:"'DM Sans', sans-serif", padding:'7px 10px', outline:'none', cursor:'pointer', ...style }}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  );
}

function Modal({ open, onClose, title, width=560, children }) {
  if(!open) return null;
  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000, backdropFilter:'blur(2px)' }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:T.bg2, border:`1px solid ${T.border2}`, borderRadius:10, width, maxWidth:'95vw', maxHeight:'90vh', overflow:'auto', boxShadow:'0 24px 64px rgba(0,0,0,0.6)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'16px 20px', borderBottom:`1px solid ${T.border}` }}>
          <span style={{ color:T.text0, fontSize:14, fontWeight:600 }}>{title}</span>
          <IconBtn onClick={onClose} title="Close"><IcoClose /></IconBtn>
        </div>
        <div style={{ padding:20 }}>{children}</div>
      </div>
    </div>
  );
}

function ConfirmModal({ open, onClose, onConfirm, title, body, confirmLabel='Confirm', danger=false }) {
  if(!open) return null;
  return (
    <Modal open={open} onClose={onClose} title={title} width={400}>
      <p style={{ color:T.text1, fontSize:14, lineHeight:1.6, marginBottom:20 }}>{body}</p>
      <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
        <Btn onClick={onClose}>Cancel</Btn>
        <Btn variant={danger?'danger':'primary'} onClick={()=>{onConfirm();onClose();}}>{confirmLabel}</Btn>
      </div>
    </Modal>
  );
}

function SectionLabel({ label }) {
  return <div style={{ padding:'8px 12px 4px', fontSize:10, fontFamily:"'DM Mono', monospace", fontWeight:600, letterSpacing:'0.1em', color:T.text3, textTransform:'uppercase' }}>{label}</div>;

function PillTabs({ tabs, active, onChange }) {
  return (
    <div style={{ display:'flex', gap:2, background:T.bg2, padding:3, borderRadius:6, border:`1px solid ${T.border}` }}>

function StatChip({ label, count, color, pulse }) {
  const pal = {
    downloading:{ bg:T.infoDim,   text:T.info,       bdr:'oklch(68% 0.14 240 / 0.3)' },
    queued:     { bg:T.bg4,       text:T.text2,      bdr:T.border2 },
    delivered:  { bg:T.accentDim, text:T.accentText, bdr:'oklch(70% 0.15 160 / 0.3)' },
    error:      { bg:T.errorDim,  text:T.error,      bdr:'oklch(65% 0.18 25 / 0.3)' },
  };
  const p = pal[color]||pal.queued;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 10px', borderRadius:5, background:p.bg, border:`1px solid ${p.bdr}`, color:p.text, fontSize:12, fontFamily:"'DM Mono', monospace" }}>

    </div>
  );
}

function AssignmentList({ client, assignments, onBack, onManageSubs, onAddSub }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const stateOpts = [
    {value:'all',label:'All'},{value:'downloading',label:'Downloading'},
    {value:'queued',label:'Queued'},{value:'delivered',label:'Delivered'},{value:'error',label:'Errors'},
  ];
  const stateOrder = { downloading:0, error:1, queued:2, delivered:3 };
  const filtered = [...assignments]
    .filter(a=>(filter==='all'||a.state===filter)&&(!search||a.title.toLowerCase().includes(search.toLowerCase())||a.episode.toLowerCase().includes(search.toLowerCase())))
    .sort((a,b)=>(stateOrder[a.state]??9)-(stateOrder[b.state]??9));
  return (
    <div style={{ padding:24, display:'flex', flexDirection:'column', gap:14, height:'100%', boxSizing:'border-box' }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <IconBtn onClick={onBack} title="Back"><IcoBack /></IconBtn>
        <div style={{ flex:1 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ color:T.text0, fontSize:16, fontWeight:600 }}>{client.name}</span>
            <Badge color={client.online?'online':'offline'} label={client.online?'online':'offline'} dot />
          </div>
          <div style={{ color:T.text3, fontSize:12, fontFamily:"'DM Mono', monospace", marginTop:1 }}>{assignments.length} assignments · {client.storageUsed} GB / {client.storageBudget} GB</div>
        </div>
        <Btn small onClick={onManageSubs}>Subscriptions</Btn>
        <Btn small variant="primary" onClick={onAddSub}><IcoPlus /> Subscribe</Btn>
      </div>
      <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
        <PillTabs tabs={stateOpts} active={filter} onChange={setFilter} />
        <div style={{ flex:1, minWidth:200, maxWidth:320 }}>
          <SynInput value={search} onChange={setSearch} placeholder="Search…" prefixIcon={<IcoSearch />} />
        </div>
      </div>
      <div style={{ flex:1, overflow:'auto', background:T.bg2, borderRadius:8, border:`1px solid ${T.border}` }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
          <thead>
            <tr style={{ position:'sticky', top:0, background:T.bg2, zIndex:1 }}>
              {['Title','Episode','Profile','State','Size',''].map(h=>(
                <th key={h} style={{ padding:'10px 14px', textAlign:'left', color:T.text3, fontSize:11, fontFamily:"'DM Mono', monospace", fontWeight:500, letterSpacing:'0.05em', borderBottom:`1px solid ${T.border}`, whiteSpace:'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(a=><AssignRow key={a.id} a={a} />)}
            {filtered.length===0 && <tr><td colSpan={6} style={{ padding:32, textAlign:'center', color:T.text3, fontSize:13 }}>No assignments match this filter.</td></tr>}
          </tbody>

    </div>
  );
}

function AssignRow({ a }) {

  return (
    <tr onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{ background:hov?T.bg3:'transparent', transition:'background 0.1s' }}>

  );
}

// SUBSCRIPTION MANAGER
// ═══════════════════════════════════════════════════════════════
function SubscriptionManager({ client, subscriptions, profiles, onBack, onAddSub, onRemove }) {
  const [confirmSub, setConfirmSub] = useState(null);
  const totalGb = subscriptions.reduce((s,sub)=>s+sub.sizeGb,0);
  const totalEps = subscriptions.reduce((s,sub)=>s+sub.episodes,0);
  return (
    <div style={{ padding:24, display:'flex', flexDirection:'column', gap:16, height:'100%', boxSizing:'border-box' }}>
      <div style={{ display:'flex', alignItems:'center', gap:12 }}>
        <IconBtn onClick={onBack} title="Back"><IcoBack /></IconBtn>
        <div style={{ flex:1 }}>
          <div style={{ color:T.text0, fontSize:16, fontWeight:600 }}>{client.name} — Subscriptions</div>
          <div style={{ color:T.text3, fontSize:12, fontFamily:"'DM Mono', monospace", marginTop:1 }}>{subscriptions.length} active · {totalEps} episodes · {totalGb.toFixed(1)} GB on disk</div>
        </div>
        <Btn variant="primary" onClick={onAddSub}><IcoPlus /> Add subscription</Btn>
      </div>
      <div style={{ flex:1, overflow:'auto', display:'flex', flexDirection:'column', gap:8 }}>
        {subscriptions.map(sub=>{
          const profile = profiles.find(p=>p.id===sub.profileId);
          return <SubRow key={sub.id} sub={sub} profile={profile} onRemove={()=>setConfirmSub(sub)} />;
        })}
        {subscriptions.length===0&&<div style={{ padding:40, textAlign:'center', color:T.text3, fontSize:14 }}>No subscriptions yet.</div>}
      </div>
      {confirmSub&&(
        <ConfirmModal open={true} onClose={()=>setConfirmSub(null)}
          onConfirm={()=>onRemove(confirmSub.id)}
          title="Remove subscription" danger confirmLabel="Remove & evict"
          body={`Remove "${confirmSub.title}" (${confirmSub.scope})? This will evict ${confirmSub.episodes} file${confirmSub.episodes!==1?'s':''} from ${client.name}.`} />
      )}
    </div>
  );
}

function SubRow({ sub, profile, onRemove }) {
  const [hov, setHov] = useState(false);
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ background:hov?T.bg3:T.bg2, border:`1px solid ${T.border}`, borderRadius:7, padding:'14px 16px', display:'flex', alignItems:'center', gap:14, transition:'background 0.15s' }}>
      <div style={{ width:32, height:32, borderRadius:6, background:T.bg4, display:'flex', alignItems:'center', justifyContent:'center', color:T.text3, flexShrink:0 }}>
        {sub.scope==='Movie'?<IcoFilm />:<IcoTV />}
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:3 }}>
          <span style={{ color:T.text0, fontWeight:600, fontSize:14 }}>{sub.title}</span>
          <span style={{ color:T.text3, fontFamily:"'DM Mono', monospace", fontSize:11 }}>{sub.scope}</span>
        </div>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'center' }}>
          {profile&&<Badge label={profile.name} />}
          <span style={{ color:T.text3, fontSize:12, fontFamily:"'DM Mono', monospace" }}>{sub.episodes} ep · {sub.sizeGb.toFixed(1)} GB</span>
        </div>
      </div>
      <IconBtn title="Remove" onClick={onRemove} style={{ color:T.error }}><IcoTrash /></IconBtn>
    </div>
  );
}

function getEpisodeStats(episodes) {
  const counts = { ready:0, transcoding:0, queued:0, failed:0, downloading:0 };
  let srcGb=0, outGb=0;
  for(const e of episodes){
    counts[e.state]=(counts[e.state]||0)+1;
    srcGb+=e.sourceGb||0;
    if(e.outputGb) outGb+=e.outputGb;
  }
  return { counts, srcGb, outGb };
}

function getAllEpisodes(item) {
  if(!item.seasons) return [{ ...item, code:'Movie', title:item.title }];
  return item.seasons.flatMap(s=>s.episodes);
}

// LIBRARY TREE — cascade-toggle foldout
// ═══════════════════════════════════════════════════════════════
function LibraryTree({ globalFilter, globalSearch, profiles, clients }) {
  // open state: set of ids that are expanded
  const [open, setOpen] = useState({});
  // sync state: { [episodeId]: Set of clientIds }
  const [syncState, setSyncState] = useState(()=>{
    const s = {};
    for(const lib of LIBRARY_DATA)
      for(const item of lib.items)
        for(const ep of getAllEpisodes(item))
          s[ep.id] = new Set(ep.clients||[]);
    return s;
  });

  const toggle = id => setOpen(p=>({...p,[id]:!p[id]}));

  // Cascade sync: set all episodes in a set to synced/unsynced for a client
  function cascadeSync(episodeIds, clientName, value) {
    setSyncState(prev=>{
      const next = {...prev};
      for(const id of episodeIds) {
        const s = new Set(next[id]||[]);
        if(value) s.add(clientName); else s.delete(clientName);
        next[id] = s;
      }
      return next;
    });
  }

  function toggleEpClient(epId, clientName) {
    setSyncState(prev=>{
      const s = new Set(prev[epId]||[]);
      if(s.has(clientName)) s.delete(clientName); else s.add(clientName);
      return {...prev,[epId]:s};
    });
  }

  // Filter episodes based on global filter/search
  function epVisible(ep) {
    const matchState = globalFilter==='all' || ep.state===globalFilter;
    const matchSearch = !globalSearch || (ep.title+' '+(ep.code||'')).toLowerCase().includes(globalSearch.toLowerCase());
    return matchState && matchSearch;
  }

  const stateColor = { ready:'ready', transcoding:'transcoding', queued:'queued', failed:'failed', downloading:'downloading' };
  const ROW_H = 40; // base row height px
  const INDENT = 20;

  // SyncToggles: pill buttons for each client, with cascade awareness
  function SyncToggles({ episodeIds, size='sm' }) {
    return (
      <div style={{ display:'flex', gap:5, alignItems:'center' }} onClick={e=>e.stopPropagation()}>
        {clients.map(c=>{
          const allOn = episodeIds.every(id=>(syncState[id]||new Set()).has(c.name));
          const someOn = !allOn && episodeIds.some(id=>(syncState[id]||new Set()).has(c.name));
          return (
            <button key={c.id}
              onClick={()=>cascadeSync(episodeIds, c.name, !allOn)}
              title={`${allOn?'Remove from':'Sync to'} ${c.name}`}
              style={{
                padding: size==='sm' ? '3px 8px' : '4px 10px',
                borderRadius:4,
                border:`1px solid ${allOn?T.accent:someOn?T.border2:T.border}`,
                background: allOn?T.accentDim : someOn?T.bg4 : 'transparent',
                color: allOn?T.accentText : someOn?T.text2 : T.text3,
                fontSize:11, fontFamily:"'DM Mono', monospace",
                cursor:'pointer', display:'flex', alignItems:'center', gap:4,
                transition:'all 0.12s',
                opacity: c.online ? 1 : 0.6,
              }}>
              <div style={{ width:5, height:5, borderRadius:'50%', background:c.online?T.accent:T.text3, flexShrink:0 }}></div>
              {c.name}
              {someOn && <span style={{ fontSize:9, opacity:.7 }}>~</span>}
            </button>
          );
        })}
      </div>
    );
  }

  function statBadges(eps) {
    const counts = {};
    for(const e of eps) counts[e.state]=(counts[e.state]||0)+1;
    return ['downloading','transcoding','failed','queued','ready'].filter(s=>counts[s]).map(s=>(
      <Badge key={s} color={s} label={`${counts[s]} ${s}`} dot />
    ));
  }

  // Row primitives
  function RowShell({ depth, open:isOpen, onToggle, children, hov, setHov, style={} }) {
    return (
      <div
        onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        onClick={onToggle}
        style={{ display:'flex', alignItems:'center', gap:8, padding:`6px 16px 6px ${16+depth*INDENT}px`, cursor:'pointer', background:hov?T.bg3:'transparent', transition:'background 0.1s', minHeight:ROW_H, ...style }}>
        <span style={{ color:T.text3, display:'flex', flexShrink:0, transition:'transform 0.15s', transform:isOpen?'rotate(90deg)':'none' }}><IcoChevR /></span>
        {children}
      </div>
    );
  }

  // ── Library level (depth 0) ──
  function LibRow({ lib }) {
    const [hov, setHov] = useState(false);
    const isOpen = !!open[lib.id];
    const allEps = lib.items.flatMap(i=>getAllEpisodes(i));
    const visibleEps = allEps.filter(epVisible);
    if(globalFilter!=='all'||globalSearch) { if(!visibleEps.length) return null; }
    const allEpIds = allEps.map(e=>e.id);
    return (
      <div>
        <RowShell depth={0} open={isOpen} onToggle={()=>toggle(lib.id)} hov={hov} setHov={setHov}
          style={{ borderBottom:`1px solid ${T.border}` }}>
          <span style={{ color:T.text3, display:'flex', flexShrink:0 }}>{lib.icon==='film'?<IcoFilm />:<IcoTV />}</span>
          <span style={{ color:T.text0, fontWeight:600, fontSize:14, flex:1 }}>{lib.name}</span>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            {statBadges(allEps)}
            <span style={{ color:T.text3, fontSize:11, fontFamily:"'DM Mono', monospace" }}>{lib.items.length} titles</span>
            <div onClick={e=>e.stopPropagation()}>
              <SyncToggles episodeIds={allEpIds} />
            </div>
          </div>
        </RowShell>
        {isOpen && lib.items.map(item=>{
          const eps = getAllEpisodes(item);
          if((globalFilter!=='all'||globalSearch)&&!eps.some(epVisible)) return null;
          return <ItemRow key={item.id} lib={lib} item={item} />;
        })}
      </div>
    );
  }

  // ── Show/Movie level (depth 1) ──
  function ItemRow({ lib, item }) {
    const [hov, setHov] = useState(false);
    const isOpen = !!open[item.id];
    const allEps = getAllEpisodes(item);
    const allEpIds = allEps.map(e=>e.id);
    const isMovie = !item.seasons;

    if(isMovie) {
      // Movie: no fold-out seasons, just a row + episode detail inline
      const ep = {...item, code:'Movie'};
      const visible = epVisible(ep);
      if(!visible) return null;
      return (
        <div>
          <MovieRow ep={ep} depth={1} allEpIds={[ep.id]} SyncToggles={SyncToggles} syncState={syncState} toggleEpClient={toggleEpClient} profiles={profiles} clients={clients} />
        </div>
      );
    }

    if((globalFilter!=='all'||globalSearch)&&!allEps.some(epVisible)) return null;

    return (
      <div>
        <RowShell depth={1} open={isOpen} onToggle={()=>toggle(item.id)} hov={hov} setHov={setHov}
          style={{ borderBottom:`1px solid ${T.border}` }}>
          <span style={{ color:T.text0, fontWeight:500, fontSize:13, flex:1 }}>{item.title}</span>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <span style={{ color:T.text3, fontSize:11, fontFamily:"'DM Mono', monospace" }}>{item.year}</span>
            {statBadges(allEps)}
            <div onClick={e=>e.stopPropagation()}>
              <SyncToggles episodeIds={allEpIds} />
            </div>
          </div>
        </RowShell>
        {isOpen && item.seasons.map(s=>{
          const sEps = s.episodes.filter(epVisible);
          if((globalFilter!=='all'||globalSearch)&&!sEps.length) return null;
          return <SeasonRow key={s.num} item={item} season={s} depth={2} SyncToggles={SyncToggles} syncState={syncState} toggleEpClient={toggleEpClient} profiles={profiles} clients={clients} epVisible={epVisible} open={open} toggle={toggle} stateColor={stateColor} />;
        })}
      </div>
    );
  }

  return (
    <div style={{ fontSize:13 }}>
      {LIBRARY_DATA.map(lib=><LibRow key={lib.id} lib={lib} />)}
    </div>
  );
}

}

  );
}

          <div style={{ color:T.text0, fontSize:18, fontWeight:600 }}>Profiles</div>
          <div style={{ color:T.text2, fontSize:13, marginTop:2 }}>Transcoding presets</div>
        </div>
        <Btn variant="primary" onClick={()=>setEditing({id:null,name:'',type:'size-first',codec:'H.264',resolution:'720p',gbPerHour:1.5})}><IcoPlus /> New profile</Btn>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {profiles.map(p=>(
          <div key={p.id} style={{ background:T.bg2, border:`1px solid ${T.border}`, borderRadius:7, padding:'16px 18px', display:'flex', alignItems:'center', gap:16 }}>
            <div style={{ width:40, height:40, borderRadius:8, background:T.bg4, display:'flex', alignItems:'center', justifyContent:'center', color:T.text3, flexShrink:0 }}><IcoProfiles /></div>
            <div style={{ flex:1 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5 }}>
                <span style={{ color:T.text0, fontWeight:600, fontSize:14 }}>{p.name}</span>
                <Badge label={typeLabels[p.type]||p.type} />
              </div>
              <div style={{ display:'flex', gap:16, flexWrap:'wrap' }}>
                <span style={{ color:T.text3, fontSize:12, fontFamily:"'DM Mono', monospace" }}>{p.codec}</span>
                <span style={{ color:T.text3, fontSize:12, fontFamily:"'DM Mono', monospace" }}>{p.resolution}</span>
                {p.gbPerHour&&<span style={{ color:T.text3, fontSize:12, fontFamily:"'DM Mono', monospace" }}>~{p.gbPerHour} GB/hr</span>}
                <span style={{ color:T.text2, fontSize:12, fontFamily:"'DM Mono', monospace" }}>{p.subscriptions} subscription{p.subscriptions!==1?'s':''}</span>
              </div>
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <Btn small onClick={()=>setEditing(p)}>Edit</Btn>
              <Btn small variant="danger" disabled={p.subscriptions>0} onClick={()=>setConfirmDel(p)}><IcoTrash /></Btn>
            </div>
          </div>
        ))}
      </div>
      <Modal open={!!editing} onClose={()=>setEditing(null)} title={editing?.id?'Edit profile':'New profile'} width={440}>
        {editing&&<ProfileForm profile={editing} onSave={p=>{onProfileChange('save',p);setEditing(null);}} onCancel={()=>setEditing(null)} />}
      </Modal>
      {confirmDel&&<ConfirmModal open={true} onClose={()=>setConfirmDel(null)} onConfirm={()=>{onProfileChange('delete',confirmDel);setConfirmDel(null);}} title="Delete profile" danger confirmLabel="Delete" body={`Delete profile "${confirmDel.name}"? This cannot be undone.`} />}
    </div>
  );
}

function ProfileForm({ profile, onSave, onCancel }) {
  const [form, setForm] = useState({...profile});
  const set = (k,v)=>setForm(f=>({...f,[k]:v}));
  const Label = ({children})=><label style={{ color:T.text2, fontSize:12, fontFamily:"'DM Mono', monospace", display:'block', marginBottom:5 }}>{children}</label>;
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div><Label>NAME</Label><SynInput value={form.name} onChange={v=>set('name',v)} placeholder="e.g. Caravan HD" /></div>
      <div><Label>TYPE</Label><SynSelect value={form.type} onChange={v=>set('type',v)} style={{ width:'100%' }} options={[{value:'quality-first',label:'Quality-first'},{value:'size-first',label:'Size-first'},{value:'passthrough',label:'Passthrough'},{value:'custom',label:'Custom'}]} /></div>
      <div style={{ display:'flex', gap:12 }}>
        <div style={{ flex:1 }}><Label>CODEC</Label><SynSelect value={form.codec} onChange={v=>set('codec',v)} style={{ width:'100%' }} options={[{value:'H.264',label:'H.264'},{value:'H.265',label:'H.265'},{value:'AV1',label:'AV1'},{value:'Original',label:'Original'}]} /></div>
        <div style={{ flex:1 }}><Label>RESOLUTION</Label><SynSelect value={form.resolution} onChange={v=>set('resolution',v)} style={{ width:'100%' }} options={[{value:'480p',label:'480p'},{value:'720p',label:'720p'},{value:'1080p',label:'1080p'},{value:'4K',label:'4K'},{value:'Original',label:'Original'}]} /></div>
      </div>
      {form.type!=='passthrough'&&<div><Label>EST. GB / HOUR</Label><SynInput value={form.gbPerHour||''} onChange={v=>set('gbPerHour',parseFloat(v)||'')} placeholder="e.g. 1.5" /></div>}
      <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:6, borderTop:`1px solid ${T.border}`, paddingTop:16 }}>
        <Btn onClick={onCancel}>Cancel</Btn>
        <Btn variant="primary" disabled={!form.name} onClick={()=>onSave(form)}>Save profile</Btn>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// CONTENT PICKER (4-step modal)
// ═══════════════════════════════════════════════════════════════
function ContentPicker({ shows, movies, profiles, client, onConfirm, onClose }) {
  const [step, setStep] = useState('browse');
  const [search, setSearch] = useState('');
  const [typeF, setTypeF] = useState('all');
  const [genreF, setGenreF] = useState('all');
  const [selContent, setSelContent] = useState(null);
  const [selSeasons, setSelSeasons] = useState([]);
  const [selProfile, setSelProfile] = useState(profiles[0]?.id||'');

  const allContent = useMemo(()=>[...shows,...movies],[]);
  const genres = useMemo(()=>['all',...Array.from(new Set(allContent.map(c=>c.genre))).sort()],[]);
  const filtered = allContent.filter(c=>(typeF==='all'||c.type===typeF)&&(genreF==='all'||c.genre===genreF)&&(!search||c.title.toLowerCase().includes(search.toLowerCase())));
  const profile = profiles.find(p=>p.id===selProfile);

  const confirmStats = useMemo(()=>{
    if(!selContent||!profile) return null;
    if(selContent.type==='movie'){
      const src=selContent.sourceGb;
      const out=profile.type==='passthrough'?src:(profile.gbPerHour*selContent.hours);
      return{episodes:1,sourceGb:src,outputGb:out,scope:'Movie'};
    }
    const seasons=selContent.seasons.filter(s=>selSeasons.includes(s.num));
    if(!seasons.length) return null;
    const episodes=seasons.reduce((s,ss)=>s+ss.episodes,0);
    const sourceGb=seasons.reduce((s,ss)=>s+ss.sourceGb,0);
    const hours=seasons.reduce((s,ss)=>s+ss.hours,0);
    const outputGb=profile.type==='passthrough'?sourceGb:(profile.gbPerHour*hours);
    const scope=seasons.length===selContent.seasons.length?'All seasons':seasons.length===1?`Season ${seasons[0].num}`:`Seasons ${seasons.map(s=>s.num).join(', ')}`;
    return{episodes,sourceGb,outputGb,scope};
  },[selContent,selSeasons,profile]);

  function pickContent(c){
    setSelContent(c);
    if(c.type==='movie'){setSelSeasons([]);setStep('profile');}
    else{setSelSeasons(c.seasons.map(s=>s.num));setStep('seasons');}
  }
  function toggleSeason(n){setSelSeasons(prev=>prev.includes(n)?prev.filter(x=>x!==n):[...prev,n]);}

  const estGb = (p,c,ss)=>{
    if(!p||!c) return 0;
    if(c.type==='movie') return p.gbPerHour?(p.gbPerHour*c.hours):c.sourceGb;
    const hrs=c.seasons.filter(s=>ss.includes(s.num)).reduce((a,s)=>a+s.hours,0);
    return p.gbPerHour?(p.gbPerHour*hrs):0;
  };

  const stepList = selContent?.type==='movie'
    ? [{k:'browse',l:'1  Browse'},{k:'profile',l:'2  Profile'},{k:'confirm',l:'3  Confirm'}]
    : [{k:'browse',l:'1  Browse'},{k:'seasons',l:'2  Select'},{k:'profile',l:'3  Profile'},{k:'confirm',l:'4  Confirm'}];
  const curIdx = stepList.findIndex(s=>s.k===step);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      {/* Step bar */}
      <div style={{ padding:'11px 20px', display:'flex', alignItems:'center', gap:8, borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
        {stepList.map((s,i)=>{
          const done=i<curIdx; const active=i===curIdx;
          return (
            <React.Fragment key={s.k}>
              <div style={{ fontSize:12, fontFamily:"'DM Mono', monospace", color:active?T.text0:done?T.accentText:T.text3, fontWeight:active?600:400, cursor:done?'pointer':'default' }}
                onClick={()=>done&&setStep(s.k)}>
                {done?<span style={{ color:T.accent }}>✓ </span>:''}{s.l}
              </div>
              {i<stepList.length-1&&<span style={{ color:T.text3, display:'flex' }}><IcoChevR /></span>}
            </React.Fragment>
          );
        })}
      </div>

      <div style={{ flex:1, overflow:'auto' }}>
        {/* Browse */}
        {step==='browse'&&(
          <div style={{ padding:18, display:'flex', flexDirection:'column', gap:12 }}>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              <div style={{ flex:1, minWidth:180 }}><SynInput value={search} onChange={setSearch} placeholder="Search library…" prefixIcon={<IcoSearch />} /></div>
              <SynSelect value={typeF} onChange={setTypeF} options={[{value:'all',label:'All types'},{value:'show',label:'TV Shows'},{value:'movie',label:'Movies'}]} />
              <SynSelect value={genreF} onChange={setGenreF} options={genres.map(g=>({value:g,label:g==='all'?'All genres':g}))} />
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
              {filtered.length===0&&<div style={{ padding:32, textAlign:'center', color:T.text3, fontSize:13 }}>No results.</div>}
              {filtered.map(c=><PickerRow key={c.id} content={c} onSelect={()=>pickContent(c)} />)}
            </div>
          </div>
        )}

        {/* Seasons */}
        {step==='seasons'&&selContent?.type==='show'&&(
          <div style={{ padding:18, display:'flex', flexDirection:'column', gap:12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <button onClick={()=>setStep('browse')} style={{ background:'none', border:'none', color:T.text2, cursor:'pointer', display:'flex', alignItems:'center', gap:4, fontSize:13, padding:0 }}><IcoBack /> Back</button>
              <span style={{ color:T.text0, fontWeight:600, fontSize:15 }}>{selContent.title}</span>
              <span style={{ color:T.text3, fontSize:13 }}>— select seasons</span>
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <Btn small onClick={()=>setSelSeasons(selContent.seasons.map(s=>s.num))}>All</Btn>
              <Btn small onClick={()=>setSelSeasons([])}>None</Btn>
            </div>
            {selContent.seasons.map(season=>{
              const on=selSeasons.includes(season.num);
              return (
                <div key={season.num} onClick={()=>toggleSeason(season.num)}
                  style={{ background:on?T.accentDim:T.bg2, border:`1px solid ${on?T.accent:T.border}`, borderRadius:7, padding:'13px 15px', display:'flex', alignItems:'center', gap:14, cursor:'pointer', transition:'all 0.15s' }}>
                  <div style={{ width:22, height:22, borderRadius:5, background:on?T.accent:T.bg4, border:`1.5px solid ${on?T.accent:T.border2}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                    {on&&<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5l2.5 2.5 4.5-4.5" stroke="#0a1a0f" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ color:on?T.accentText:T.text0, fontWeight:600, fontSize:14, marginBottom:3 }}>Season {season.num}</div>
                    <div style={{ color:T.text2, fontSize:12, fontFamily:"'DM Mono', monospace" }}>{season.episodes} episodes · {season.sourceGb} GB source</div>
                  </div>
                  {on&&profile&&<div style={{ textAlign:'right' }}>
                    <div style={{ color:T.accentText, fontSize:13, fontFamily:"'DM Mono', monospace", fontWeight:500 }}>~{(profile.gbPerHour*season.hours).toFixed(1)} GB</div>
                    <div style={{ color:T.text3, fontSize:11, fontFamily:"'DM Mono', monospace" }}>at {profile.name}</div>
                  </div>}
                </div>
              );
            })}
            <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:4 }}>
              <Btn onClick={()=>setStep('browse')}>Back</Btn>
              <Btn variant="primary" disabled={selSeasons.length===0} onClick={()=>setStep('profile')}>Choose profile <IcoChevR /></Btn>
            </div>
          </div>
        )}

        {/* Profile */}
        {step==='profile'&&(
          <div style={{ padding:18, display:'flex', flexDirection:'column', gap:12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <button onClick={()=>setStep(selContent?.type==='movie'?'browse':'seasons')} style={{ background:'none', border:'none', color:T.text2, cursor:'pointer', display:'flex', alignItems:'center', gap:4, fontSize:13, padding:0 }}><IcoBack /> Back</button>
              <span style={{ color:T.text0, fontWeight:600, fontSize:15 }}>{selContent?.title}</span>
              <span style={{ color:T.text3, fontSize:13 }}>— choose profile</span>
            </div>
            {profiles.map(p=>{
              const on=selProfile===p.id;
              const est=estGb(p,selContent,selSeasons);
              return (
                <div key={p.id} onClick={()=>setSelProfile(p.id)}
                  style={{ background:on?T.accentDim:T.bg2, border:`1px solid ${on?T.accent:T.border}`, borderRadius:7, padding:'13px 15px', display:'flex', alignItems:'center', gap:14, cursor:'pointer', transition:'all 0.15s' }}>
                  <div style={{ width:22, height:22, borderRadius:'50%', background:on?T.accent:T.bg4, border:`1.5px solid ${on?T.accent:T.border2}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                    {on&&<div style={{ width:8, height:8, borderRadius:'50%', background:'#0a1a0f' }}></div>}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ color:on?T.accentText:T.text0, fontWeight:600, fontSize:14, marginBottom:3 }}>{p.name}</div>
                    <div style={{ color:T.text2, fontSize:12, fontFamily:"'DM Mono', monospace" }}>{p.codec} · {p.resolution}{p.gbPerHour?` · ~${p.gbPerHour} GB/hr`:''}</div>
                  </div>
                  {est>0&&<div style={{ textAlign:'right' }}>
                    <div style={{ color:on?T.accentText:T.text2, fontSize:13, fontFamily:"'DM Mono', monospace", fontWeight:500 }}>~{est.toFixed(1)} GB</div>
                    <div style={{ color:T.text3, fontSize:11, fontFamily:"'DM Mono', monospace" }}>estimated</div>
                  </div>}
                </div>
              );
            })}
            <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:4 }}>
              <Btn onClick={()=>setStep(selContent?.type==='movie'?'browse':'seasons')}>Back</Btn>
              <Btn variant="primary" onClick={()=>setStep('confirm')}>Preview <IcoChevR /></Btn>
            </div>
          </div>
        )}

        {/* Confirm */}
        {step==='confirm'&&confirmStats&&(
          <div style={{ padding:22, display:'flex', flexDirection:'column', gap:16 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <button onClick={()=>setStep('profile')} style={{ background:'none', border:'none', color:T.text2, cursor:'pointer', display:'flex', alignItems:'center', gap:4, fontSize:13, padding:0 }}><IcoBack /> Back</button>
              <span style={{ color:T.text0, fontWeight:600, fontSize:15 }}>Confirm subscription</span>
            </div>
            <div style={{ background:T.bg3, border:`1px solid ${T.border2}`, borderRadius:8, padding:18, display:'flex', flexDirection:'column', gap:14 }}>
              <div style={{ display:'flex', gap:12, alignItems:'center' }}>
                <div style={{ width:38, height:38, borderRadius:8, background:T.accentDim, display:'flex', alignItems:'center', justifyContent:'center', color:T.accent }}>
                  {selContent?.type==='movie'?<IcoFilm />:<IcoTV />}
                </div>
                <div>
                  <div style={{ color:T.text0, fontWeight:600, fontSize:16 }}>{selContent?.title}</div>
                  <div style={{ color:T.text2, fontSize:13, fontFamily:"'DM Mono', monospace" }}>{confirmStats.scope}</div>
                </div>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                {[{l:'Target client',v:client.name},{l:'Profile',v:profile?.name||'—'},{l:'Episodes to queue',v:String(confirmStats.episodes),a:true},{l:'Source size',v:`~${confirmStats.sourceGb.toFixed(0)} GB`}].map(x=>(
                  <div key={x.l} style={{ background:T.bg4, borderRadius:5, padding:'10px 12px' }}>
                    <div style={{ color:T.text3, fontSize:11, fontFamily:"'DM Mono', monospace", marginBottom:3 }}>{x.l.toUpperCase()}</div>
                    <div style={{ color:x.a?T.accentText:T.text0, fontSize:14, fontFamily:"'DM Mono', monospace", fontWeight:600 }}>{x.v}</div>
                  </div>
                ))}
              </div>
              {/* Size reduction */}
              <div style={{ background:T.bg4, borderRadius:6, padding:'13px 15px', display:'flex', flexDirection:'column', gap:8 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <div><div style={{ color:T.text3, fontSize:11, fontFamily:"'DM Mono', monospace", marginBottom:2 }}>SOURCE</div>
                    <div style={{ color:T.text1, fontSize:18, fontFamily:"'DM Mono', monospace", fontWeight:600 }}>~{confirmStats.sourceGb.toFixed(0)} GB</div></div>
                  <div style={{ color:T.text3, fontSize:18 }}>→</div>
                  <div style={{ textAlign:'right' }}><div style={{ color:T.text3, fontSize:11, fontFamily:"'DM Mono', monospace", marginBottom:2 }}>TRANSCODED</div>
                    <div style={{ color:T.accentText, fontSize:18, fontFamily:"'DM Mono', monospace", fontWeight:600 }}>~{confirmStats.outputGb.toFixed(0)} GB</div></div>
                </div>
                <div style={{ height:6, background:T.bg3, borderRadius:4, overflow:'hidden' }}>
                  <div style={{ width:`${Math.min(100,(confirmStats.outputGb/confirmStats.sourceGb)*100)}%`, height:'100%', background:T.accent, borderRadius:4 }}></div>
                </div>
                <div style={{ color:T.accentText, fontSize:12, fontFamily:"'DM Mono', monospace" }}>
                  {Math.round((1-confirmStats.outputGb/confirmStats.sourceGb)*100)}% smaller at {profile?.name}
                </div>
              </div>
              {/* Storage fit */}
              {(()=>{
                const rem=client.storageBudget-client.storageUsed;
                const fits=confirmStats.outputGb<=rem;
                return (
                  <div style={{ background:fits?T.accentDim:T.errorDim, border:`1px solid ${fits?T.accent:T.error}`, borderRadius:6, padding:'10px 14px', display:'flex', alignItems:'center', gap:8, color:fits?T.accentText:T.error, fontSize:13 }}>
                    {fits?<>✓ Fits on {client.name} — {rem.toFixed(0)} GB free</>:<><IcoWarn /> Not enough space — {rem.toFixed(0)} GB free, need ~{confirmStats.outputGb.toFixed(0)} GB</>}
                  </div>
                );
              })()}
            </div>
            <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
              <Btn onClick={onClose}>Cancel</Btn>
              <Btn variant="primary" onClick={()=>onConfirm({content:selContent,seasons:selSeasons,profileId:selProfile,stats:confirmStats})}>
                Create subscription — queue {confirmStats.episodes} episode{confirmStats.episodes!==1?'s':''}
              </Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function PickerRow({ content, onSelect }) {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={onSelect} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 12px', borderRadius:6, background:hov?T.bg3:'transparent', cursor:'pointer', transition:'background 0.1s' }}>
      <div style={{ width:30, height:30, borderRadius:5, background:T.bg4, display:'flex', alignItems:'center', justifyContent:'center', color:T.text3, flexShrink:0 }}>
        {content.type==='movie'?<IcoFilm />:<IcoTV />}
      </div>
      <div style={{ flex:1 }}>
        <span style={{ color:T.text0, fontWeight:500, fontSize:14 }}>{content.title}</span>
        <span style={{ color:T.text3, fontFamily:"'DM Mono', monospace", fontSize:11, marginLeft:8 }}>{content.year}</span>
      </div>
      <div style={{ display:'flex', gap:8, alignItems:'center' }}>
        <Badge label={content.genre} />
        {content.type==='show'&&<span style={{ color:T.text3, fontSize:12, fontFamily:"'DM Mono', monospace" }}>{content.seasons.length}S</span>}
        {content.type==='movie'&&<span style={{ color:T.text3, fontSize:12, fontFamily:"'DM Mono', monospace" }}>{content.sourceGb} GB</span>}
        <span style={{ color:T.text3, display:'flex' }}><IcoChevR /></span>
      </div>
    </div>
  );
}

// SIDEBAR
// ═══════════════════════════════════════════════════════════════
function Sidebar({ activeSection, activeClientId, onNav, clients, onSelectClient, width }) {
  const navItems = [
    {id:'clients',label:'Clients',Icon:IcoClients},
    {id:'assets', label:'Assets', Icon:IcoAssets},
    {id:'profiles',label:'Profiles',Icon:IcoProfiles},
  ];
  return (
    <div style={{ width, flexShrink:0, background:'#1c1917', borderRight:`1px solid ${T.border}`, display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
      {/* Logo */}
      <div style={{ padding:'15px 14px 12px', borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:26, height:26, borderRadius:6, background:T.accentDim, display:'flex', alignItems:'center', justifyContent:'center', color:T.accent }}><IcoSat /></div>
          <span style={{ color:T.text0, fontSize:14, fontWeight:600, fontFamily:"'DM Mono', monospace", letterSpacing:'-0.01em' }}>syncarr</span>
          <div style={{ marginLeft:'auto', width:7, height:7, borderRadius:'50%', background:T.accent, boxShadow:`0 0 6px ${T.accent}`, animation:'pulse-dot 2s ease-in-out infinite' }}></div>
        </div>
      </div>
      {/* Nav */}
      <div style={{ padding:'8px 8px 0', flexShrink:0 }}>
        {navItems.map(({id,label,Icon})=>{
          const active=activeSection===id&&!activeClientId;
          return <SidebarNav key={id} label={label} icon={<Icon />} active={active} onClick={()=>onNav(id)} />;
        })}
      </div>
      <div style={{ height:1, background:T.border, margin:'8px 12px' }}></div>
      {/* Clients */}
      <div style={{ flex:1, overflow:'auto', padding:'0 8px 8px' }}>
        <SectionLabel label="Clients" />
        {clients.map(c=><SidebarClient key={c.id} client={c} active={activeClientId===c.id} onClick={()=>onSelectClient(c)} />)}
      </div>
      {/* Footer */}
      <div style={{ padding:'10px 14px', borderTop:`1px solid ${T.border}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:5 }}>
          <div style={{ width:6, height:6, borderRadius:'50%', background:T.accent }}></div>
          <span style={{ color:T.text3, fontSize:11, fontFamily:"'DM Mono', monospace" }}>server running</span>
        </div>
        <div style={{ color:T.text3, fontSize:11, fontFamily:"'DM Mono', monospace", marginTop:1 }}>v0.4.1 · local</div>
      </div>
    </div>
  );
}

function SidebarNav({ label, icon, active, onClick }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ width:'100%', display:'flex', alignItems:'center', gap:9, padding:'7px 10px', borderRadius:5, border:'none', cursor:'pointer', background:active?T.bg4:hov?T.bg3:'transparent', color:active?T.text0:T.text2, fontSize:13, fontWeight:active?500:400, transition:'background 0.1s, color 0.1s', marginBottom:2, textAlign:'left' }}>
      <span style={{ color:active?T.accent:hov?T.text1:T.text3 }}>{icon}</span>{label}
    </button>
  );
}

function SidebarClient({ client, active, onClick }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ width:'100%', display:'flex', alignItems:'center', gap:8, padding:'6px 10px', borderRadius:5, border:'none', cursor:'pointer', background:active?T.bg4:hov?T.bg3:'transparent', transition:'background 0.1s', marginBottom:1, textAlign:'left' }}>
      <div style={{ width:7, height:7, borderRadius:'50%', flexShrink:0, background:client.online?T.accent:T.text3, boxShadow:client.online&&client.counts.downloading>0?`0 0 5px ${T.accent}`:'none' }}></div>
      <span style={{ color:active?T.text0:T.text1, fontSize:13, fontWeight:active?500:400, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{client.name}</span>
      {client.counts.errors>0&&<div style={{ width:7, height:7, borderRadius:'50%', background:T.error, flexShrink:0 }}></div>}
      {client.counts.downloading>0&&<span style={{ color:T.info, fontSize:10, fontFamily:"'DM Mono', monospace" }}>{client.counts.downloading}↓</span>}
    </button>
  );
}

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
function Toast({ message, onDone }) {
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t);},[]);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:2000, background:T.bg3, border:`1px solid ${T.border2}`, borderRadius:8, padding:'12px 18px', display:'flex', alignItems:'center', gap:10, boxShadow:'0 8px 32px rgba(0,0,0,0.5)', animation:'fadeIn 0.2s ease' }}>
      <div style={{ width:8, height:8, borderRadius:'50%', background:T.accent }}></div>
      <span style={{ color:T.text0, fontSize:13 }}>{message}</span>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TWEAKS PANEL
// ═══════════════════════════════════════════════════════════════
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "green",
  "sidebarWidth": 220,
  "showSizes": true
}/*EDITMODE-END*/;

function TweaksPanel({ tweaks, setTweak, onClose }) {
  const [pos, setPos] = useState({x: window.innerWidth - 280, y: 80});
  const drag = React.useRef(null);
  const onMD = e => { drag.current = {ox:e.clientX-pos.x, oy:e.clientY-pos.y}; };
  useEffect(()=>{
    const mm=e=>{if(drag.current) setPos({x:e.clientX-drag.current.ox, y:e.clientY-drag.current.oy});};
    const mu=()=>{drag.current=null;};
    window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
    return()=>{window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu);};
  },[]);
  const accentOpts=[{v:'green',l:'Green'},{v:'blue',l:'Blue'},{v:'amber',l:'Amber'},{v:'violet',l:'Violet'}];
  return (
    <div style={{ position:'fixed', left:pos.x, top:pos.y, width:240, background:T.bg2, border:`1px solid ${T.border2}`, borderRadius:10, boxShadow:'0 16px 48px rgba(0,0,0,0.6)', zIndex:3000, userSelect:'none' }}>
      <div onMouseDown={onMD} style={{ padding:'12px 14px', borderBottom:`1px solid ${T.border}`, display:'flex', alignItems:'center', justifyContent:'space-between', cursor:'move' }}>
        <span style={{ color:T.text0, fontSize:13, fontWeight:600 }}>Tweaks</span>
        <IconBtn onClick={onClose} title="Close"><IcoClose /></IconBtn>
      </div>
      <div style={{ padding:14, display:'flex', flexDirection:'column', gap:14 }}>
        <div>
          <div style={{ color:T.text3, fontSize:10, fontFamily:"'DM Mono', monospace", letterSpacing:'0.1em', marginBottom:8 }}>ACCENT COLOR</div>
          <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
            {accentOpts.map(o=>(
              <button key={o.v} onClick={()=>setTweak('accentColor',o.v)}
                style={{ padding:'5px 10px', borderRadius:4, border:`1px solid ${tweaks.accentColor===o.v?T.accent:T.border2}`, background:tweaks.accentColor===o.v?T.accentDim:T.bg4, color:tweaks.accentColor===o.v?T.accentText:T.text2, fontSize:12, cursor:'pointer', transition:'all 0.1s' }}>{o.l}</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{ color:T.text3, fontSize:10, fontFamily:"'DM Mono', monospace", letterSpacing:'0.1em', marginBottom:8 }}>SIDEBAR WIDTH — {tweaks.sidebarWidth}px</div>
          <input type="range" min={180} max={280} step={10} value={tweaks.sidebarWidth} onChange={e=>setTweak('sidebarWidth',Number(e.target.value))}
            style={{ width:'100%', accentColor:T.accent }} />
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <span style={{ color:T.text2, fontSize:13 }}>Show file sizes</span>
          <button onClick={()=>setTweak('showSizes',!tweaks.showSizes)}
            style={{ width:36, height:20, borderRadius:10, border:'none', cursor:'pointer', background:tweaks.showSizes?T.accent:T.bg4, transition:'background 0.2s', position:'relative' }}>
            <div style={{ position:'absolute', top:2, left:tweaks.showSizes?18:2, width:16, height:16, borderRadius:'50%', background:'white', transition:'left 0.2s' }}></div>
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════
const ACCENT_MAP = {
  green:  {accent:'oklch(70% 0.15 160)', accentDim:'oklch(70% 0.15 160 / 0.15)', accentText:'oklch(75% 0.14 160)'},
  blue:   {accent:'oklch(68% 0.14 240)', accentDim:'oklch(68% 0.14 240 / 0.15)', accentText:'oklch(73% 0.12 240)'},
  amber:  {accent:'oklch(72% 0.14 80)',  accentDim:'oklch(72% 0.14 80 / 0.15)',  accentText:'oklch(76% 0.13 80)'},
  violet: {accent:'oklch(68% 0.14 300)', accentDim:'oklch(68% 0.14 300 / 0.15)', accentText:'oklch(73% 0.12 300)'},
};

function App() {
  const [tweaks, setTweaksState] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  const [section, setSection] = useState('clients');
  const [activeClientId, setActiveClientId] = useState(null);
  const [clientView, setClientView] = useState('assignments');

  const [clients, setClients] = useState(INIT_CLIENTS);
  const [profiles, setProfiles] = useState(INIT_PROFILES);
  const [subs, setSubs] = useState(INIT_SUBSCRIPTIONS);
  const [assignments] = useState(INIT_ASSIGNMENTS);
  const [assets] = useState(INIT_ASSETS);

  const [pickerOpen, setPickerOpen] = useState(false);
  const [pickerClientId, setPickerClientId] = useState(null);
  const [toast, setToast] = useState(null);

  // Apply accent color — mutate T then force a state update via a dedicated counter
  const [, forceUpdate] = useState(0);
  useEffect(()=>{
    const colors = ACCENT_MAP[tweaks.accentColor]||ACCENT_MAP.green;
    Object.assign(T, colors);
    forceUpdate(n => n+1);
  },[tweaks.accentColor]);

  // Tweaks protocol
  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode') setShowTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const setTweak = useCallback((k,v)=>{
    const next = typeof k==='object'?{...tweaks,...k}:{...tweaks,[k]:v};
    setTweaksState(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:next},'*');
  },[tweaks]);

  const showToast = msg=>setToast(msg);

  function navTo(id){ setSection(id); setActiveClientId(null); }
  function selectClient(c){ setActiveClientId(c.id); setSection('clients'); setClientView('assignments'); }
  function openPicker(c){ setPickerClientId(c.id); setPickerOpen(true); }

  function confirmSubscription({content,seasons,profileId,stats}){
    const newSub={id:`sub_${Date.now()}`,contentId:content.id,title:content.title,scope:stats.scope,episodes:stats.episodes,profileId,sizeGb:parseFloat(stats.outputGb.toFixed(1))};
    setSubs(prev=>({...prev,[pickerClientId]:[...(prev[pickerClientId]||[]),newSub]}));
    setClients(prev=>prev.map(c=>c.id===pickerClientId?{...c,counts:{...c.counts,queued:c.counts.queued+stats.episodes}}:c));
    showToast(`Subscription created — ${stats.episodes} episodes queued`);
  }

  function removeSub(clientId, subId){
    setSubs(prev=>({...prev,[clientId]:(prev[clientId]||[]).filter(s=>s.id!==subId)}));
    showToast('Subscription removed — eviction queued');
  }

  function handleProfileChange(action,p){
    if(action==='save'){
      if(p.id) setProfiles(prev=>prev.map(x=>x.id===p.id?{...x,...p}:x));
      else setProfiles(prev=>[...prev,{...p,id:`p_${Date.now()}`,subscriptions:0}]);
      showToast(p.id?'Profile updated':'Profile created');
    } else {
      setProfiles(prev=>prev.filter(x=>x.id!==p.id));
      showToast('Profile deleted');
    }
  }

  const activeClient = activeClientId ? clients.find(c=>c.id===activeClientId) : null;
  const pickerClient = pickerClientId ? clients.find(c=>c.id===pickerClientId) : null;

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden', background:T.bg0 }}>
      <Sidebar
        activeSection={section}
        activeClientId={activeClientId}
        onNav={navTo}
        clients={clients}
        onSelectClient={selectClient}
        width={tweaks.sidebarWidth}
      />
      <div style={{ flex:1, overflow:'auto', display:'flex', flexDirection:'column' }}>
        {section==='clients'&&!activeClient&&(
          <ClientDashboard clients={clients} onSelectClient={selectClient} onAddSubscription={openPicker} />
        )}
        {section==='clients'&&activeClient&&clientView==='assignments'&&(
          <AssignmentList
            client={activeClient}
            assignments={assignments}
            onBack={()=>setActiveClientId(null)}
            onManageSubs={()=>setClientView('subscriptions')}
            onAddSub={()=>openPicker(activeClient)}
          />
        )}
        {section==='clients'&&activeClient&&clientView==='subscriptions'&&(
          <SubscriptionManager
            client={activeClient}
            subscriptions={subs[activeClient.id]||[]}
            profiles={profiles}
            onBack={()=>setClientView('assignments')}
            onAddSub={()=>openPicker(activeClient)}
            onRemove={subId=>removeSub(activeClient.id,subId)}
          />
        )}
        {section==='assets'&&<AssetInspector assets={assets} profiles={profiles} clients={clients} />}
        {section==='profiles'&&<ProfileManager profiles={profiles} onProfileChange={handleProfileChange} />}
      </div>

      {/* Content picker modal */}
      {pickerOpen&&pickerClient&&(
        <div onClick={()=>setPickerOpen(false)} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000, backdropFilter:'blur(2px)' }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:T.bg2, border:`1px solid ${T.border2}`, borderRadius:10, width:640, height:680, display:'flex', flexDirection:'column', boxShadow:'0 32px 80px rgba(0,0,0,0.7)', overflow:'hidden' }}>
            <div style={{ padding:'14px 20px', borderBottom:`1px solid ${T.border}`, display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
              <div>
                <span style={{ color:T.text0, fontWeight:600, fontSize:14 }}>Add subscription</span>
                <span style={{ color:T.text3, fontSize:13, marginLeft:8 }}>→ {pickerClient.name}</span>
              </div>
              <IconBtn onClick={()=>setPickerOpen(false)} title="Close"><IcoClose /></IconBtn>
            </div>
            <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
              <ContentPicker
                shows={SHOWS} movies={MOVIES} profiles={profiles}
                client={pickerClient}
                onConfirm={data=>{confirmSubscription(data);setPickerOpen(false);}}
                onClose={()=>setPickerOpen(false)}
              />
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast message={toast} onDone={()=>setToast(null)} />}
      {showTweaks&&<TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={()=>{setShowTweaks(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
if (window.__splashDone) window.__splashDone();
</script>
</body>
</html>
